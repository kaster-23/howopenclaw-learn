name: Sync OpenClaw docs

on:
  schedule:
    - cron: "0 9 * * *" # Daily at 9am UTC
  workflow_dispatch:     # Manual trigger from GitHub UI

# Opt all JS actions (checkout, setup-node, action-setup) into Node 24 to
# silence the Node 20 deprecation warning ahead of the June 2026 default flip.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if update needed
        id: check
        run: |
          LAST=$(cat .openclaw-last-version 2>/dev/null | tr -d '[:space:]' || echo "")
          # /releases/latest returns the most recent stable release (no betas, no drafts).
          # Matches the official OpenClaw docs site, which only documents stable.
          LATEST=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/OpenClaw/OpenClaw/releases/latest" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name',''))" 2>/dev/null || echo "")
          echo "last=$LAST"
          echo "latest=$LATEST"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ -z "$LATEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Could not fetch latest release — skipping"
          elif [ "$LAST" = "$LATEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ Already up to date with $LATEST — nothing to do"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🆕 New release detected: $LATEST (was: $LAST)"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.skip == 'false'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Run docs sync
        if: steps.check.outputs.skip == 'false'
        id: sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm tsx scripts/sync-openclaw.ts

      - name: Lint
        if: steps.check.outputs.skip == 'false' && steps.sync.outputs.updated == 'true'
        run: pnpm lint

      - name: Build
        if: steps.check.outputs.skip == 'false' && steps.sync.outputs.updated == 'true'
        run: pnpm build

      - name: Commit and push to main
        if: steps.check.outputs.skip == 'false' && steps.sync.outputs.updated == 'true'
        run: |
          git config user.name "kaster-23"
          git config user.email "francoierace.dev@gmail.com"
          git add -A
          git commit -m "docs: sync with OpenClaw ${{ steps.sync.outputs.version }}"
          git push origin main

      # Version-only bump: triage decided no MDX needed updating, but we still
      # commit .openclaw-last-version so the next daily run doesn't re-triage
      # the same release forever. Skip lint/build — nothing else changed.
      - name: Commit version bump only (no doc changes)
        if: steps.check.outputs.skip == 'false' && steps.sync.outputs.updated == 'false' && steps.sync.outputs.version_only == 'true'
        run: |
          git config user.name "kaster-23"
          git config user.email "francoierace.dev@gmail.com"
          git add .openclaw-last-version
          git commit -m "chore: track OpenClaw ${{ steps.sync.outputs.version }} (no doc changes needed)"
          git push origin main
