name: Sync OpenClaw docs

on:
  schedule:
    - cron: "0 9 * * *" # Daily at 9am UTC
  workflow_dispatch:     # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check if update needed
        id: check
        run: |
          LAST=$(cat .openclaw-last-version 2>/dev/null | tr -d '[:space:]' || echo "")
          LATEST=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/OpenClaw/OpenClaw/releases/latest \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('tag_name',''))" 2>/dev/null || echo "")
          echo "last=$LAST"
          echo "latest=$LATEST"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ -z "$LATEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Could not fetch latest release — skipping"
          elif [ "$LAST" = "$LATEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ Already up to date with $LATEST — nothing to do"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🆕 New release detected: $LATEST (was: $LAST)"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.skip == 'false'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Run docs sync
        if: steps.check.outputs.skip == 'false'
        id: sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm tsx scripts/sync-openclaw.ts

      - name: Commit version file to main
        if: steps.check.outputs.skip == 'false' && steps.sync.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .openclaw-last-version
          git commit -m "chore: track OpenClaw ${{ steps.sync.outputs.version }}"
          git push

      - name: Create pull request
        if: steps.check.outputs.skip == 'false' && steps.sync.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: sync with OpenClaw ${{ steps.sync.outputs.version }}"
          branch: "docs/sync-openclaw-${{ steps.sync.outputs.version }}"
          title: "docs: sync with OpenClaw ${{ steps.sync.outputs.version }}"
          body: |
            Auto-generated documentation update for OpenClaw release `${{ steps.sync.outputs.version }}`.

            **What changed:**
            ${{ steps.sync.outputs.release_notes }}

            > Please review the diff before merging. Claude may have missed things or made minor errors — a human review pass is recommended.
          labels: "documentation,automated"
          delete-branch: true
